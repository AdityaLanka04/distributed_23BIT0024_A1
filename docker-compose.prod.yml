services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - quiz_network
    restart: always
    command: redis-server --appendonly yes

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-quizdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - quiz_network
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    depends_on:
      - redis
      - postgres
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://${DB_USER:-user}:${DB_PASSWORD:-password}@postgres/${DB_NAME:-quizdb}
      - ENVIRONMENT=production
    networks:
      - quiz_network
    restart: always
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 512M

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      - redis
      - postgres
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://${DB_USER:-user}:${DB_PASSWORD:-password}@postgres/${DB_NAME:-quizdb}
    networks:
      - quiz_network
    restart: always
    command: celery -A distributed.task_queue.celery_app worker --loglevel=info --concurrency=4
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 512M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - REACT_APP_API_URL=/api
    expose:
      - "3000"
    depends_on:
      - backend
    networks:
      - quiz_network
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/var/www/static:ro
      - ./media:/var/www/media:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - quiz_network
    restart: always

volumes:
  redis_data:
  postgres_data:
  nginx_logs:

networks:
  quiz_network:
    driver: bridge
