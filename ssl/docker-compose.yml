services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - quiz_network

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: quizdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - quiz_network

  backend:
    build: ../backend
    expose:
      - "8000"
    depends_on:
      - redis
      - postgres
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://user:password@postgres/quizdb
    volumes:
      - ../backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - quiz_network

  celery_worker:
    build: ../backend
    depends_on:
      - redis
      - postgres
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://user:password@postgres/quizdb
    volumes:
      - ../backend:/app
    command: celery -A distributed.task_queue.celery_app worker --loglevel=info
    networks:
      - quiz_network

  frontend:
    build: ../frontend
    expose:
      - "3000"
    depends_on:
      - backend
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=/api
    networks:
      - quiz_network

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ../nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ../static:/var/www/static:ro
      - ../media:/var/www/media:ro
    depends_on:
      - backend
      - frontend
    networks:
      - quiz_network
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:

networks:
  quiz_network:
    driver: bridge
